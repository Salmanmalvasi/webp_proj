<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Support | Tesla</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <style>
    .page-hero {
      padding: 120px 20px 60px;
      text-align: center;
      background: #f4f4f4;
    }
    .page-hero h1 { font-size: 40px; margin-bottom: 20px; }
    .page-hero p { font-size: 18px; color: #5c5e62; max-width: 700px; margin: 0 auto; line-height: 1.6; }
    .form-container {
      max-width: 600px; margin: 40px auto; padding: 40px; background: white; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: 500; color: #5c5e62; margin-bottom: 8px; }
    .form-group input, .form-group textarea { width: 100%; border: 1px solid #ddd; padding: 12px; border-radius: 4px; font-family: inherit; }
  </style>
</head>
<body data-page="contact">
  <nav class="nav nav--solid">
    <a href="index.html" class="nav__logo">
      <svg viewBox="0 0 342 35" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 .1a9.7 9.7 0 0 0 7 7h11l.5.1v27.6h6.8V7.3L26 7h11a9.8 9.8 0 0 0 7-7H0zm238.6 0h-6.8v34.8H263a9.7 9.7 0 0 0 6-6.8h-30.3V0zm-52.3 6.8c3.6-1 6.6-3.8 7.4-6.9l-38.1.1v20.6h31.1v7.2h-24.4a13.6 13.6 0 0 0-8.7 7h39.9v-21h-31.2v-7h24zm116.2 28h6.7v-14h24.6v14h6.7v-21h-38zM85.3 7h26a9.6 9.6 0 0 0 7.1-7H78.3a9.6 9.6 0 0 0 7 7zm0 13.8h26a9.6 9.6 0 0 0 7.1-7H78.3a9.6 9.6 0 0 0 7 7zm0 14.1h26a9.6 9.6 0 0 0 7.1-7H78.3a9.6 9.6 0 0 0 7 7zM308.5 7h26a9.6 9.6 0 0 0 7-7h-40a9.6 9.6 0 0 0 7 7z" fill="currentColor"/>
      </svg>
    </a>
    <div class="nav__menu">
      <a href="models/model-s.html" class="nav__link">Model S</a>
      <a href="models/model-3.html" class="nav__link">Model 3</a>
      <a href="models/model-x.html" class="nav__link">Model X</a>
      <a href="models/model-y.html" class="nav__link">Model Y</a>
      <a href="models/cybertruck.html" class="nav__link">Cybertruck</a>
    </div>
    <div class="nav__actions">
      <a href="cart.html" class="nav__cart">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="21" r="1"></circle>
          <circle cx="20" cy="21" r="1"></circle>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
        <span class="cart-count hidden">0</span>
      </a>
    </div>
  </nav>

  <div class="page-hero">
    <h1>Contact Support</h1>
    <p>Have questions about a new vehicle, existing order, or finding a service center? We are here to help.</p>
  </div>

  <div class="form-container">
    <form onsubmit="event.preventDefault(); alert('Message Sent. A Tesla advisor will contact you soon!'); window.location.href='index.html';">
      <div class="form-group">
        <label>Name</label>
        <input type="text" required placeholder="John Doe">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" required placeholder="hello@example.com">
      </div>
      <div class="form-group">
        <label>Inquiry Type</label>
        <select style="width: 100%; border: 1px solid #ddd; padding: 12px; border-radius: 4px;">
          <option>Sales and Orders</option>
          <option>Service and Repairs</option>
          <option>General Feedback</option>
        </select>
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea rows="6" required placeholder="How can we assist you?"></textarea>
      </div>
      <button class="btn btn--primary" style="width: 100%;">Send Message</button>
    </form>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
