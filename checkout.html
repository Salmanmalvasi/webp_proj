  <main class="checkout-page">
    <div class="checkout-container">
      <h1 class="checkout-title">Checkout</h1>
      
      <form class="checkout-form">
        <!-- Order Summary -->
        <div class="checkout-order-summary">
          <!-- Populated by JS -->
        </div>

        <!-- Contact Information -->
        <div class="form-section">
          <h2 class="form-section__title">Contact Information</h2>
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label" for="firstName">First Name *</label>
              <input type="text" id="firstName" name="firstName" class="form-input" required placeholder="John">
            </div>
            <div class="form-group">
              <label class="form-label" for="lastName">Last Name *</label>
              <input type="text" id="lastName" name="lastName" class="form-input" required placeholder="Doe">
            </div>
            <div class="form-group">
              <label class="form-label" for="email">Email *</label>
              <input type="email" id="email" name="email" class="form-input" required placeholder="john@example.com">
            </div>
            <div class="form-group">
              <label class="form-label" for="phone">Phone *</label>
              <input type="tel" id="phone" name="phone" class="form-input" required placeholder="+1 (555) 123-4567">
            </div>
          </div>
        </div>

        <!-- Delivery Address -->
        <div class="form-section">
          <h2 class="form-section__title">Delivery Address</h2>
          <div class="form-grid">
            <div class="form-group form-group--full">
              <label class="form-label" for="address">Street Address *</label>
              <input type="text" id="address" name="address" class="form-input" required placeholder="123 Main Street">
            </div>
            <div class="form-group form-group--full">
              <label class="form-label" for="address2">Apartment, suite, etc. (optional)</label>
              <input type="text" id="address2" name="address2" class="form-input" placeholder="Apt 4B">
            </div>
            <div class="form-group">
              <label class="form-label" for="city">City *</label>
              <input type="text" id="city" name="city" class="form-input" required placeholder="San Francisco">
            </div>
            <div class="form-group">
              <label class="form-label" for="state">State *</label>
              <input type="text" id="state" name="state" class="form-input" required placeholder="California">
            </div>
            <div class="form-group">
              <label class="form-label" for="zip">ZIP Code *</label>
              <input type="text" id="zip" name="zip" class="form-input" required placeholder="94105">
            </div>
            <div class="form-group">
              <label class="form-label" for="country">Country *</label>
              <input type="text" id="country" name="country" class="form-input" required value="United States" placeholder="United States">
            </div>
          </div>
        </div>

        <!-- Payment Information -->
        <div class="form-section">
          <h2 class="form-section__title">Payment Information</h2>
          <div class="form-grid">
            <div class="form-group form-group--full">
              <label class="form-label" for="cardNumber">Card Number *</label>
              <input type="text" id="cardNumber" name="cardNumber" class="form-input" required placeholder="1234 5678 9012 3456" maxlength="19">
            </div>
            <div class="form-group">
              <label class="form-label" for="cardName">Name on Card *</label>
              <input type="text" id="cardName" name="cardName" class="form-input" required placeholder="John Doe">
            </div>
            <div class="form-group">
              <label class="form-label" for="expiry">Expiration Date *</label>
              <input type="text" id="expiry" name="expiry" class="form-input" required placeholder="MM/YY" maxlength="5">
            </div>
            <div class="form-group">
              <label class="form-label" for="cvv">CVV *</label>
              <input type="text" id="cvv" name="cvv" class="form-input" required placeholder="123" maxlength="4">
            </div>
          </div>
        </div>

        <!-- Actions -->
        <div class="checkout-actions">
          <a href="cart.html" class="checkout-back">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
            Back to Cart
          </a>
          <button type="submit" class="btn btn--primary">Place Order</button>
        </div>
      </form>
    </div>
  </main>
