<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configure Your Tesla</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body data-page="config">
  <!-- Navigation -->
  <nav class="nav nav--solid">
    <a href="index.html" class="nav__logo">
      <svg viewBox="0 0 342 35" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 .1a9.7 9.7 0 0 0 7 7h11l.5.1v27.6h6.8V7.3L26 7h11a9.8 9.8 0 0 0 7-7H0zm238.6 0h-6.8v34.8H263a9.7 9.7 0 0 0 6-6.8h-30.3V0zm-52.3 6.8c3.6-1 6.6-3.8 7.4-6.9l-38.1.1v20.6h31.1v7.2h-24.4a13.6 13.6 0 0 0-8.7 7h39.9v-21h-31.2v-7h24zm116.2 28h6.7v-14h24.6v14h6.7v-21h-38zM85.3 7h26a9.6 9.6 0 0 0 7.1-7H78.3a9.6 9.6 0 0 0 7 7zm0 13.8h26a9.6 9.6 0 0 0 7.1-7H78.3a9.6 9.6 0 0 0 7 7zm0 14.1h26a9.6 9.6 0 0 0 7.1-7H78.3a9.6 9.6 0 0 0 7 7zM308.5 7h26a9.6 9.6 0 0 0 7-7h-40a9.6 9.6 0 0 0 7 7z" fill="currentColor"/>
      </svg>
    </a>
    
    <div class="nav__menu">
      <a href="models/model-s.html" class="nav__link">Model S</a>
      <a href="models/model-3.html" class="nav__link">Model 3</a>
      <a href="models/model-x.html" class="nav__link">Model X</a>
      <a href="models/model-y.html" class="nav__link">Model Y</a>
      <a href="models/cybertruck.html" class="nav__link">Cybertruck</a>
    </div>

    <div class="nav__actions">
      <a href="cart.html" class="nav__cart">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="21" r="1"></circle>
          <circle cx="20" cy="21" r="1"></circle>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
        <span class="cart-count hidden">0</span>
      </a>
      <button class="nav__hamburger" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <!-- Mobile Menu -->
  <div class="mobile-overlay"></div>
  <div class="mobile-menu">
    <button class="mobile-menu__close">&times;</button>
    <div class="mobile-menu__links">
      <a href="models/model-s.html" class="mobile-menu__link">Model S</a>
      <a href="models/model-3.html" class="mobile-menu__link">Model 3</a>
      <a href="models/model-x.html" class="mobile-menu__link">Model X</a>
      <a href="models/model-y.html" class="mobile-menu__link">Model Y</a>
      <a href="models/cybertruck.html" class="mobile-menu__link">Cybertruck</a>
      <a href="cart.html" class="mobile-menu__link">Cart</a>
    </div>
  </div>

  <main class="config-page">
    <div class="config-container">
      <!-- Preview Section -->
      <div class="config-preview">
        <img class="config-preview__image" src="https://images.unsplash.com/photo-1560958089-b8a1929cea89?w=1000&q=80" alt="Vehicle Preview">
        <h1 class="config-preview__title">Model 3</h1>
        <p class="config-preview__price">$40,240</p>
      </div>

      <!-- Options Section -->
      <div class="config-options">
        <!-- Variant Selection -->
        <div class="config-section">
          <h2 class="config-section__title">Select Variant</h2>
          <div class="option-grid" data-options="variant">
            <!-- Populated by JS -->
          </div>
        </div>

        <!-- Color Selection -->
        <div class="config-section">
          <h2 class="config-section__title">Select Color</h2>
          <div class="color-options">
            <!-- Populated by JS -->
          </div>
        </div>

        <!-- Interior Selection -->
        <div class="config-section">
          <h2 class="config-section__title">Select Interior</h2>
          <div class="option-grid" data-options="interior">
            <!-- Populated by JS -->
          </div>
        </div>

        <!-- Wheels Selection -->
        <div class="config-section">
          <h2 class="config-section__title">Select Wheels</h2>
          <div class="option-grid" data-options="wheels">
            <!-- Populated by JS -->
          </div>
        </div>

        <!-- Autopilot Selection -->
        <div class="config-section">
          <h2 class="config-section__title">Autopilot</h2>
          <div class="option-grid" data-options="autopilot">
            <!-- Populated by JS -->
          </div>
        </div>

        <!-- Summary and Add to Cart -->
        <div class="config-summary">
          <div class="config-summary__total">
            <span class="config-summary__label">Purchase Price</span>
            <span class="config-summary__price">$40,240</span>
          </div>
          <button class="btn btn--primary btn--full config-add-cart">Add to Cart</button>
          <p class="text-gray text-center mt-2" style="font-size: 12px;">
            Prices shown include potential savings. Final price at checkout.
          </p>
        </div>
      </div>
    </div>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
